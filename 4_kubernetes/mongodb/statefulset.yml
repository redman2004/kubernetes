---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
spec:
  selector:
    matchLabels:
      app: mongodb
  serviceName: "mongodb"
  replicas: 1
  template: 
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: registry.cri.epita.fr/ing/majeures/tc/info/sundaland/mongo:7.0.5
          ports:
            - containerPort: 27017
          envFrom:
            - secretRef:
                name: mongodb-admin-credentials
            - secretRef:
                name: sundaland-mongodb-credentials
            - configMapRef:
                name: sundaland-backend-config
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
            - name: mongodb-initdb
              mountPath: /docker-entrypoint-initdb.d/
              subPath: init.js
          env:
            - name: MONGO_INITDB_DATABASE
              value: "Sundaland"
      volumes:
        - name: mongodb-initdb
          configMap:
            name: mongodb-initdb
      imagePullSecrets:
        - name: sundaland-pull-secret

  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi